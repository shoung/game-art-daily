ont-size:24px;cursor:pointer;color:var(--gray);z-index:10}.modal-image{width:100%;height:250px;object-fit:cover}.modal-content{padding:24px}.modal-source{display:inline-block;background:var(--primary);color:#fff;padding:4px 12px;border-radius:4px;font-size:12px;margin-bottom:12px}.modal-title{font-size:20px;font-weight:600;margin-bottom:8px}.modal-original-title{font-size:13px;color:var(--gray);margin-bottom:16px;font-style:italic}.modal-body{font-size:15px;line-height:1.8;color:var(--dark);margin-bottom:20px}.modal-link{color:var(--primary);text-decoration:underline;font-size:14px}footer{padding:30px 0;border-top:1px solid var(--light-gray);text-align:center;color:var(--gray);font-size:12px}</style></head><body><div class="container"><header><div class="logo">Game Art Outsourcing</div><h1>游戏美术外包日报</h1><p class="date">2026年3月2-8日</p><p class="stats">📊 1 条讨论（已過濾招募訊息，熱門度>=200）</p><div class="week-tabs"><a href="index.html" class="week-tab ">本周</a><a href="week10.html" class="week-tab active">第10周</a><a href="week09.html" class="week-tab ">第9周</a></div></header>
