<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏美术外包周报 11期</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e20001;
            --dark: #1a1a1a;
            --gray: #666666;
            --light-gray: #f5f5f5;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.15);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--white);
            color: var(--dark);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
        
        /* Header */
        header {
            padding: 60px 0 40px;
            border-bottom: 1px solid var(--light-gray);
            margin-bottom: 60px;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 14px;
            font-weight: 500;
            color: var(--gray);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .week-badge {
            background: var(--primary);
            color: white;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 30px;
        }
        
        h1 {
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 16px;
            letter-spacing: -1px;
        }
        
        h1 span { color: var(--primary); }
        
        .subtitle {
            font-size: 18px;
            color: var(--gray);
            font-weight: 300;
        }
        
        .date-info {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            font-size: 14px;
            color: var(--gray);
        }
        
        .date-info span { display: flex; align-items: center; gap: 8px; }
        
        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 80px;
        }
        
        .stat-card {
            background: var(--white);
            border: 1px solid var(--light-gray);
            padding: 30px;
            border-radius: 16px;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }
        
        .stat-number {
            font-size: 42px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 14px;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Tag Sections */
        .tag-section {
            margin-bottom: 80px;
        }
        
        .tag-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .tag-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--dark);
        }
        
        .tag-count {
            background: var(--light-gray);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--gray);
        }
        
        /* Bento Grid */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        
        .bento-item {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            opacity: 0;
            transform: translateY(30px);
        }
        
        .bento-item:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }
        
        .bento-item.large { grid-column: span 2; }
        
        .bento-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--light-gray);
        }
        
        .bento-content {
            padding: 24px;
        }
        
        .bento-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 12px;
            color: var(--gray);
        }
        
        .bento-source {
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 500;
        }
        
        .bento-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--dark);
            margin-bottom: 8px;
            line-height: 1.5;
        }
        
        .bento-title a {
            color: inherit;
            text-decoration: none;
        }
        
        .bento-title a:hover { color: var(--primary); }
        
        .bento-title-zh {
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 16px;
        }
        
        .bento-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid var(--light-gray);
        }
        
        .bento-stats {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: var(--gray);
        }
        
        .bento-stats span { display: flex; align-items: center; gap: 4px; }
        
        .bento-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .tag {
            background: var(--light-gray);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--gray);
        }
        
        /* Footer */
        footer {
            padding: 60px 0;
            border-top: 1px solid var(--light-gray);
            margin-top: 60px;
            text-align: center;
            color: var(--gray);
            font-size: 14px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .bento-item.large { grid-column: span 1; }
            .header-top { flex-direction: column; gap: 20px; }
            h1 { font-size: 32px; }
            .bento-grid { grid-template-columns: 1fr; }
        }
        
        /* Loading Animation */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--gray);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div>
                    <div class="logo">Game Art Outsourcing</div>
                    <h1>周报 <span>11</span></h1>
                    <p class="subtitle">游戏美术外包行业论坛讨论精选</p>
                </div>
                <div class="week-badge">第 11 期</div>
            </div>
            <div class="date-info">
                <span>📅 2026年03月14日 周六</span>
                <span>📊 11 条讨论</span>
            </div>
        </header>
        
        <!-- 统计卡片 -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number">0</div>
                <div class="stat-label">Reddit 讨论</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">11</div>
                <div class="stat-label">日本论坛</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">1</div>
                <div class="stat-label">话题分类</div>
            </div>
        </div>

        <footer>
            <p>📅 报告自动生成于 2026-03-14 05:48</p>
            <p>🔄 每周一自动更新 | 由 GitHub Actions 驱动</p>
        </footer>
    </div>
    
    <script>
        // GSAP Animations
        gsap.registerPlugin(ScrollTrigger);
        
        // Header animation
        gsap.from('header', {
            duration: 1,
            y: -50,
            opacity: 0,
            ease: 'power3.out'
        });
        
        // Stats animation
        gsap.from('.stat-card', {
            duration: 0.8,
            y: 50,
            opacity: 0,
            stagger: 0.15,
            delay: 0.3,
            ease: 'power3.out'
        });
        
        // Bento items animation
        gsap.utils.toArray('.bento-item').forEach((item, i) => {
            gsap.to(item, {
                scrollTrigger: {
                    trigger: item,
                    start: 'top 85%',
                    toggleActions: 'play none none reverse'
                },
                duration: 0.6,
                y: 0,
                opacity: 1,
                delay: i * 0.05,
                ease: 'power2.out'
            });
        });
        
        // Hover effects
        document.querySelectorAll('.bento-item').forEach(item => {
            item.addEventListener('mouseenter', () => {
                gsap.to(item, { scale: 1.02, duration: 0.3 });
            });
            item.addEventListener('mouseleave', () => {
                gsap.to(item, { scale: 1, duration: 0.3 });
            });
        });
    </script>
</body>
</html>
